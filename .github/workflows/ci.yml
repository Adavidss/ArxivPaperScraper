name: CI

on:
  push:
    branches: [main]
  pull_request:

# Public repo: CI runs on fork PRs, so keep the token read-only. (Fork PRs
# never receive secrets, and digest.yml is unreachable from forks — its
# triggers are schedule, dispatch, and pushes to main only.)
permissions:
  contents: read

jobs:
  scraper:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: scraper/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npx tsc --noEmit

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
